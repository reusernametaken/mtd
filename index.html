<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2203.fyi // Mesh That Divide</title>
<meta name="description" content="Mesh That Divide -- community Meshtastic network.">

<!--
  ============================================================
  mtd.2203.fyi -- Mesh That Divide page. Save this file as
  index.html inside the mtd subdomain's web root.

  One of three standalone subdomain pages in a fixed loop:
    KNET (86)  ->  MESH THAT DIVIDE (mtd)  ->  JUST GREENS (greens)  -> back to KNET

  On THIS page (mtd):
    left peek  = JUST GREENS  (previous in the loop)
    right peek = KNET         (next in the loop)

  Flag content: top slice of the real Mesh That Divide poster
  (the title/tagline band), cropped out and sized to fill the
  header frame. Keeps its own natural off-white/cream background
  -- no transparency keying this time, unlike greens, since this
  image is meant to visually BE the surface of the zone it sits
  in, not float as a ghost layer over something else.
  Asset: assets/mtd-header.jpg (cropped from the original poster,
  y:0-320 of 1316 total height).

  Body content: the rest of the poster (mountains, radio-wave
  arcs, road, ground -- everything below the title band),
  proportionally resized to fill the lower half of center-frame
  edge to edge. Asset: assets/mtd-body.jpg (y:320-1316).

  Peek cards are real partial previews of their destination page
  now (echo treatment), not text-only info cards. Left (GREENS)
  shows a slice of assets/greens-icons-ghost.png (needs to sit in
  assets/ here too) plus live "Just Greens" text in Lora, echoing
  the real greens.2203.fyi flag. Right (KNET) has no photo asset,
  so its header is recreated in pure CSS -- same diagonal black/
  blue gradient + kNET wordmark as the real page. Both echo the
  DESTINATION's own header, not this page's -- earlier draft had
  this backwards (was showing MTD's own header on the KNET card),
  corrected per Sven's clarification.

  Nav arrows moved off this page's own flag entirely and now live
  on the peek cards, positioned at each card's INNER edge (facing
  center) -- sitting at the margin between this page and whichever
  one you'd click into.
  ============================================================
-->

<style>
  :root {
    --bg:        #050607;
    --panel:     #0b0d10;
    --blue:      #1c3fd9;
    --blue-deep: #0a154d;
    --ink:       #e8e8e8;
    --white:     #ffffff;
    --dim:       #6b7280;
    --glow:      #4fd1ff;
    --rule:      #22262c;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
    --flag-accent: #c9812f;
    --header-tone: #ede4c5;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }

  .page-shell {
    width: 100%;
    max-width: 1100px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 999;
  }

  .flag {
    position: relative;
    height: 200px;
    background-image: url('assets/mtd-header.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    overflow: hidden;
  }

  .prompt {
    margin: 18px 0 0;
    font-size: 14px;
    color: var(--dim);
  }
  .prompt span { color: var(--glow); }

  hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 24px 0;
  }

  /* ---------- center content: poster body fill ---------- */
  .poster-body {
    margin-top: 24px;
    line-height: 0;
  }
  .poster-body img {
    display: block;
    width: 100%;
    height: auto;
  }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .frameset-track {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 14px;
  }

  .peek {
    flex: 1 1 180px;
    min-width: 0;
    max-width: 220px;
    display: flex;
    align-items: stretch;
    position: relative;
  }

  .peek-arrow {
    position: absolute;
    top: 100px;
    transform: translateY(-50%);
    z-index: 3;
    background: none;
    border: none;
    padding: 4px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(15px, 3vw, 20px);
    letter-spacing: 0.04em;
    cursor: pointer;
    line-height: 1;
    text-decoration: none;
    display: inline-block;
    color: var(--dim);
  }
  .peek-arrow:hover,
  .peek-arrow:focus-visible {
    color: var(--glow);
  }
  .peek--left .peek-arrow { right: 8px; }
  .peek--right .peek-arrow { left: 8px; }

  /* ---------- frame: a duplicated partial view of the neighboring
     page's header graphic, true scale (200px, matching this page's
     own flag height), plus a flat color-coded block standing in for
     its body. No text -- just the graphic, the color, and the arrow. ---------- */
  .frame {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    opacity: 0.6;
    cursor: pointer;
    transition: opacity 0.15s ease;
    overflow: hidden;
    border: 1px solid var(--rule);
  }
  .frame:hover,
  .frame:focus-visible {
    opacity: 1;
  }
  .frame-header { height: 200px; flex-shrink: 0; }
  .frame-body { flex: 1 1 auto; }

  /* destination: knet -- RIGHT-side frame, so we show the edge of its
     header closest to this page (its left/leading edge) -- true
     scale matching 86.2203.fyi's own flag (44px wordmark) */
  .frame-header--knet {
    background: linear-gradient(135deg, #000 49.6%, #1c3fd9 50.4%);
    display: flex;
    align-items: center;
    overflow: hidden;
    padding-left: 16px;
  }
  .frame-header--knet span {
    color: #fff;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 44px;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .frame-body--knet { background: #000000; }

  /* destination: just greens -- LEFT-side frame, so we show the edge of
     its header closest to this page (its right/trailing edge) -- true
     scale matching greens.2203.fyi's own flag (72px wordmark) */
  .frame-header--greens {
    position: relative;
    background-color: #ffffff;
    background-image: url('assets/greens-icons-ghost.png');
    background-size: auto 200px;
    background-position: right center;
    background-repeat: no-repeat;
  }
  .frame-header--greens::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.34);
  }
  .frame-header--greens span {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    padding-right: 24px;
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    font-weight: 600;
    font-size: 72px;
    line-height: 1;
    white-space: nowrap;
    color: #201c16;
  }
  .frame-body--greens { background: #ffffff; }


  main.center-frame {
    flex: 1 1 auto;
    min-width: 0;
    max-width: 640px;
  }

  .page-strip {
    margin-top: 18px;
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: baseline;
  }
  .page-strip .stop {
    font-size: 12px;
    color: var(--dim);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .page-strip .stop.is-active {
    color: var(--glow);
    border-bottom-color: var(--glow);
  }

  @media (max-width: 860px) {
    .frameset-track {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .frameset-track::-webkit-scrollbar { display: none; }

    .peek {
      scroll-snap-align: center;
      flex: 0 0 80vw;
      max-width: none;
    }
    main.center-frame {
      scroll-snap-align: center;
      flex: 0 0 88vw;
    }
  }

</style>
</head>

<body>
<div class="page-shell">

  <div class="frameset-track">
      <aside class="peek peek--left">
        <a class="peek-arrow" href="https://greens.2203.fyi/" aria-label="Previous: Just Greens" title="Just Greens🌱">[ &rsaquo; ]</a>
        <a class="frame" href="https://greens.2203.fyi/" aria-label="Previous: Just Greens">
          <div class="frame-header frame-header--greens"><span>Just Greens</span></div>
          <div class="frame-body frame-body--greens"></div>
        </a>
      </aside>

      <main class="center-frame">

        <div class="flag">
        </div>

        <p class="prompt"><span>$</span> node --status scaffold // mtd.2203.fyi</p>

        <hr>

        <div class="poster-body">
          <img src="assets/mtd-body.jpg" alt="Mesh That Divide -- mountains and radio waves over the divide">
        </div>

        <footer>
          <span>MESH THAT DIVIDE // mtd.2203.fyi</span>
          <span>last updated: --</span>
        </footer>

      </main>

      <aside class="peek peek--right">
        <a class="frame" href="https://86.2203.fyi/" aria-label="Next: kNET">
          <div class="frame-header frame-header--knet"><span>kNET</span></div>
          <div class="frame-body frame-body--knet"></div>
        </a>
        <a class="peek-arrow" href="https://86.2203.fyi/" aria-label="Next: kNET" title="kNET📡">[ &lsaquo; ]</a>
      </aside>
  </div>

  <nav class="page-strip">
    <a class="stop" href="https://86.2203.fyi/">KNET</a>
    <a class="stop is-active" href="https://mtd.2203.fyi/">MESH THAT DIVIDE</a>
    <a class="stop" href="https://greens.2203.fyi/">JUST GREENS</a>
  </nav>

</div>
</body>
</html>
