<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2203.fyi // Mesh That Divide</title>
<meta name="description" content="Mesh That Divide -- community Meshtastic network.">

<!--
  ============================================================
  mtd.2203.fyi -- Mesh That Divide page. Save this file as
  index.html inside the mtd subdomain's web root.

  One of three standalone subdomain pages in a fixed loop:
    KNET (86)  ->  MESH THAT DIVIDE (mtd)  ->  JUST GREENS (greens)  -> back to KNET

  On THIS page (mtd):
    left peek  = JUST GREENS  (previous in the loop)
    right peek = KNET         (next in the loop)

  Flag content: top slice of the real Mesh That Divide poster
  (the title/tagline band), cropped out and sized to fill the
  header frame. Keeps its own natural off-white/cream background
  -- no transparency keying this time, unlike greens, since this
  image is meant to visually BE the surface of the zone it sits
  in, not float as a ghost layer over something else.
  Asset: assets/mtd-header.jpg (cropped from the original poster,
  y:0-320 of 1316 total height).

  Body content: the rest of the poster (mountains, radio-wave
  arcs, road, ground -- everything below the title band),
  proportionally resized to fill the lower half of center-frame
  edge to edge. Asset: assets/mtd-body.jpg (y:320-1316).

  Peek cards are real partial previews of their destination page
  now (echo treatment), not text-only info cards. Left (GREENS)
  shows a slice of assets/greens-icons-ghost.png (needs to sit in
  assets/ here too) plus live "Just Greens" text in Lora, echoing
  the real greens.2203.fyi flag. Right (KNET) has no photo asset,
  so its header is recreated in pure CSS -- same diagonal black/
  blue gradient + kNET wordmark as the real page. Both echo the
  DESTINATION's own header, not this page's -- earlier draft had
  this backwards (was showing MTD's own header on the KNET card),
  corrected per Sven's clarification.

  Nav arrows moved off this page's own flag entirely and now live
  on the peek cards, positioned at each card's INNER edge (facing
  center) -- sitting at the margin between this page and whichever
  one you'd click into.
  ============================================================
-->

<style>
  :root {
    --bg:        #050607;
    --panel:     #0b0d10;
    --blue:      #1c3fd9;
    --blue-deep: #0a154d;
    --ink:       #e8e8e8;
    --white:     #ffffff;
    --dim:       #6b7280;
    --glow:      #4fd1ff;
    --rule:      #22262c;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
    --flag-accent: #c9812f;
    --header-tone: #ede4c5;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }

  .page-shell {
    width: 100%;
    max-width: 1100px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 999;
  }

  .flag {
    position: relative;
    height: 200px;
    background-image: url('assets/mtd-header.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    overflow: hidden;
  }

  .prompt {
    margin: 18px 0 0;
    font-size: 14px;
    color: var(--dim);
  }
  .prompt span { color: var(--glow); }

  hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 24px 0;
  }

  /* ---------- center content: poster body fill ---------- */
  .poster-body {
    margin-top: 24px;
    line-height: 0;
  }
  .poster-body img {
    display: block;
    width: 100%;
    height: auto;
  }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-size: 12px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .frameset-track {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 14px;
  }

  .peek {
    flex: 1 1 180px;
    min-width: 0;
    max-width: 220px;
    display: flex;
    align-items: center;
    position: relative;
  }

  .peek-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    background: none;
    border: none;
    padding: 4px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(15px, 3vw, 20px);
    letter-spacing: 0.04em;
    cursor: pointer;
    line-height: 1;
    text-decoration: none;
    display: inline-block;
    color: var(--dim);
  }
  .peek-arrow:hover,
  .peek-arrow:focus-visible {
    color: var(--glow);
  }
  .peek--left .peek-arrow { right: 8px; }
  .peek--right .peek-arrow { left: 8px; }

  .peek-card {
    width: 100%;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border: 1px solid var(--rule);
    border-top: 3px solid var(--peek-accent, var(--blue));
    background: var(--panel);
    padding: 14px 12px;
    text-decoration: none;
    color: inherit;
    opacity: 0.6;
    cursor: pointer;
    transition: opacity 0.15s ease;
    overflow: hidden;
  }
  .peek-card:hover,
  .peek-card:focus-visible {
    opacity: 1;
  }
  .peek-eyebrow {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--dim);
  }
  .peek-card h3 {
    margin: 4px 0 6px;
    font-size: 14px;
    color: var(--white);
  }
  .peek-card p {
    margin: 0;
    font-size: 12px;
    color: var(--dim);
  }

  /* ---------- echo cards: a genuine partial preview of the destination page ---------- */
  .peek-card--echo { padding: 0; justify-content: flex-start; }
  .peek-echo-img { height: 64px; flex-shrink: 0; }
  .peek-echo-body { flex: 1 1 auto; padding: 14px 12px; display: flex; flex-direction: column; justify-content: flex-end; }

  /* destination: knet -- this is a RIGHT-side peek, so we show the
     LEADING edge (kN), recreated in CSS, zoomed in hard */
  .peek-echo-img--knet {
    background: linear-gradient(135deg, #000 49.6%, #1c3fd9 50.4%);
    display: flex;
    align-items: center;
    overflow: hidden;
    padding-left: 6px;
  }
  .peek-echo-img--knet span {
    color: #fff;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 130px;
    line-height: 1;
    white-space: nowrap;
    letter-spacing: 0.02em;
    text-shadow: 0 0 8px rgba(255,255,255,0.3);
  }
  .peek-echo-body--knet { background: #1c3fd9; }
  .peek-echo-body--knet .peek-eyebrow { color: rgba(255,255,255,0.65); }
  .peek-echo-body--knet h3 { color: #ffffff; }
  .peek-echo-body--knet p { color: rgba(255,255,255,0.8); }

  /* destination: just greens -- this is a LEFT-side peek, so we show the
     TRAILING edge (...eens), zoomed in hard */
  .peek-echo-img--greens {
    position: relative;
    background-color: #ffffff;
    background-image: url('assets/greens-icons-ghost.png');
    background-size: 1500px auto;
    background-position: right center;
    background-repeat: no-repeat;
    overflow: hidden;
  }
  .peek-echo-img--greens::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.45);
  }
  .peek-echo-img--greens span {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    padding-right: 8px;
    font-family: 'Lora', Georgia, 'Times New Roman', serif;
    font-weight: 600;
    font-size: 175px;
    line-height: 1;
    white-space: nowrap;
    color: #201c16;
  }
  .peek-echo-body--greens { background: #ffffff; }
  .peek-echo-body--greens .peek-eyebrow { color: #8a8a8a; }
  .peek-echo-body--greens h3 { color: #1a1a1a; }
  .peek-echo-body--greens p { color: #6b7280; }

  main.center-frame {
    flex: 1 1 auto;
    min-width: 0;
    max-width: 640px;
  }

  .page-strip {
    margin-top: 18px;
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: baseline;
  }
  .page-strip .stop {
    font-size: 12px;
    color: var(--dim);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .page-strip .stop.is-active {
    color: var(--glow);
    border-bottom-color: var(--glow);
  }

  @media (max-width: 860px) {
    .frameset-track {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .frameset-track::-webkit-scrollbar { display: none; }

    .peek {
      scroll-snap-align: center;
      flex: 0 0 80vw;
      max-width: none;
    }
    main.center-frame {
      scroll-snap-align: center;
      flex: 0 0 88vw;
    }
  }

</style>
</head>

<body>
<div class="page-shell">

  <div class="frameset-track">
      <aside class="peek peek--left">
        <a class="peek-arrow" href="https://greens.2203.fyi/" aria-label="Previous: Just Greens" title="Just Greens🌱">[ &rsaquo; ]</a>
        <a class="peek-card peek-card--echo" href="https://greens.2203.fyi/" style="--peek-accent:#2f9e44">
          <div class="peek-echo-img peek-echo-img--greens">
            <img src="assets/greens-icons-ghost.png" alt="">
            <span>Just Greens</span>
          </div>
          <div class="peek-echo-body peek-echo-body--greens">
            <span class="peek-eyebrow">PREV</span>
            <h3>JUST GREENS</h3>
            <p>nonprofit produce, window grow array</p>
          </div>
        </a>
      </aside>

      <main class="center-frame">

        <div class="flag">
        </div>

        <p class="prompt"><span>$</span> node --status scaffold // mtd.2203.fyi</p>

        <hr>

        <div class="poster-body">
          <img src="assets/mtd-body.jpg" alt="Mesh That Divide -- mountains and radio waves over the divide">
        </div>

        <footer>
          <span>MESH THAT DIVIDE // mtd.2203.fyi</span>
          <span>last updated: --</span>
        </footer>

      </main>

      <aside class="peek peek--right">
        <a class="peek-card peek-card--echo" href="https://86.2203.fyi/" style="--peek-accent:#1c3fd9">
          <div class="peek-echo-img peek-echo-img--knet"><span>kNET</span></div>
          <div class="peek-echo-body peek-echo-body--knet">
            <span class="peek-eyebrow">NEXT</span>
            <h3>KNET</h3>
            <p>landing / tools / projects</p>
          </div>
        </a>
        <a class="peek-arrow" href="https://86.2203.fyi/" aria-label="Next: kNET" title="kNET📡">[ &lsaquo; ]</a>
      </aside>
  </div>

  <nav class="page-strip">
    <a class="stop" href="https://86.2203.fyi/">KNET</a>
    <a class="stop is-active" href="https://mtd.2203.fyi/">MESH THAT DIVIDE</a>
    <a class="stop" href="https://greens.2203.fyi/">JUST GREENS</a>
  </nav>

</div>
</body>
</html>
