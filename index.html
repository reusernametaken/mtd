<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2203.fyi // Mesh That Divide</title>
<meta name="description" content="Mesh That Divide -- community-owned Meshtastic mesh network, Kremmling to the Front Range.">

<!--
  ============================================================
  2203.fyi -- Mesh That Divide landing page (rebuild v7)
  Plain HTML/CSS/vanilla JS. The page itself is still one file with
  everything embedded (poster, promo photos, all inline) -- the one
  new external dependency is the content/ directory the sidebar
  fetches real pages from at click time (see CHANGES FROM v5).

  CHANGES FROM v6:
    - The crisp (never-ghosted) zone shrank from "tagline + headline
      + subtitle" down to just "tagline + headline." The subtitle
      (the project description right under "MESH THAT DIVIDE") now
      ghosts along with the mountains/arcs/road whenever a path is
      injected -- previously it stayed crisp with the text above it,
      which wasn't actually what was being asked. New transition
      window is 17.2% to 20.9%, the exact blank gap between the
      headline's real pixel end and the subtitle's real pixel start,
      so it still never fades mid-word.
    - .stub-copy's top padding changed from 30% to 36.78% -- NOT to
      "26%" as first attempted. padding-top is a CSS percentage of
      the containing block's WIDTH regardless of axis, while
      .side-nav's top:26% resolves against HEIGHT (the correct
      behavior for an offset property) -- so naively setting both to
      "26%" landed them on two different lines entirely (confirmed
      by measuring, ~72px apart at test width). 36.78% of this
      frame's width is what equals 26% of its height, given the
      fixed 1360:1924 aspect ratio. Verified in a live render: stub
      content and the USERS:/DEV/OPS: label headers now share the
      same top edge.

  CHANGES FROM v5:
    - Sidebar links now fetch real content instead of reading
      inline placeholder strings. The old STUBS object is gone;
      renderContent(key) fetches content/<key>.html and drops it
      into .stub-copy over the ghosted poster. Content files are
      fragments only (no doctype/html/head/body) -- see the content/
      files themselves for the 12 pages this ships with. Missing
      files (not yet uploaded) fail to a visible "Not Yet Uploaded"
      message instead of a blank pane -- also what shows if this is
      previewed over file:// rather than a real server, since fetch()
      can't read local files that way; a quick `python3 -m
      http.server` from this file's directory is enough to preview
      it for real.
    - .poster-frame's fixed height was previously safe because STUB
      text was always one short line. Real content runs longer, so
      .stub-copy is now its own scrollable layer (overflow-y:auto,
      absolutely positioned to the frame's exact fixed size) sitting
      OVER a separate, also-absolutely-positioned ghost image layer
      that never scrolls. Long pages scroll internally; the frame's
      outer height -- and everything in the margins positioned
      against it -- still never moves.
    - Promo cards corrected from an approximated 4.4% (my own
      estimate of where the tagline sits) to an exact
      calc(var(--knet-banner-h) / 2) -- k-NET's real, literal,
      hardcoded 200px flag height was sitting in the file the whole
      time; no reason to keep estimating when the ground truth was
      available. See --knet-banner-h in :root and the .promo comment
      below for the full reasoning.

  CHANGES FROM v4 (two corrections):
    - Promo cards moved back up to 4.4% -- the top TAGLINE's own
      center ("WE'RE ALREADY HIGH...", y:76-121 of 2245), not the
      13.2% headline center v3/v4 used. That 13.2% figure was wrong
      for what was actually being asked: k-NET's real page centers
      its promo cards on the flag BANNER itself, a compact zone
      flush against the page's top edge -- not on any specific line
      of text inside it. The tagline is this poster's closest analog
      to that banner zone, so that's the new anchor. (The old doc
      comment's claim that 13.2% was "the right number ... worth
      copying to k-NET's and Just Greens' own pages" was therefore
      also wrong and should NOT have been carried anywhere -- 4.4% is
      the number, if this convention gets copied at all.)
    - STUB ghosting now only fades the poster ART, never the
      masthead. Previously the whole poster dropped to 12% opacity
      behind STUB text; now a mask-image gradient keeps everything
      above 23% (tagline, headline, subtitle -- all the actual text)
      at full strength and only fades what's below that into the
      open field STUB copy sits in. Same single <img>, no second
      cropped asset -- see .poster-img--ghost.

  CHANGES FROM v3:
    - Nav arrows removed entirely (HTML, CSS, and the nearestLive()/
      prevTarget/nextTarget JS that only existed to drive them -- all
      deleted, not hidden). The scrubber (.page-strip) is now the
      only carousel navigation; it already links to every neighbor,
      the arrows were redundant chrome.
    - Right-hand nav relabeled DEV/OPS: (was DEVS:) -- it already
      contains an OPS category, so the label just says what's
      actually in it.

  CHANGES FROM v2 (per direct feedback -- this is the placement
  convention to copy onto k-NET's and Just Greens' own pages
  wherever they position a promo card or nav arrow against a
  headline):

    1. Nav arrows and the two promo cards now anchor to 13.2% down
       the poster -- the true vertical center of the "MESH THAT
       DIVIDE" headline itself, measured directly off the source
       art (headline spans y:207-386 of 2245px). Not an eyeballed
       guess and not tied to the flag's own box height like v1/v2
       were -- if the poster crop or headline size ever changes,
       recompute this the same way (scan the image for the text
       block's actual pixel bounds) rather than nudging it by eye.
    2. USERS:/DEV/OPS: nav blocks anchor to 26% -- clear of every
       line of text in the poster (the subtitle's last row ends at
       24.1%), landing right where the radio-wave arcs take over.
       Deliberately a start-line, not a center point like the promo
       cards -- "adjacent to the mountains" reads as "begins here,"
       not "centered here."
    3. .poster-frame now holds a FIXED aspect-ratio (1360x1924,
       matching the embedded image's own pixel dimensions) instead
       of sizing itself off whatever's inside #centerContent. That's
       load-bearing: since the promo cards and nav blocks are
       positioned by percentage against the margin columns' stretched
       height (which tracks .poster-frame via align-items:stretch),
       letting the frame's height collapse to fit short STUB text
       would drag the margin columns' height down with it and throw
       every percentage off. Fixed aspect-ratio means the frame is
       exactly as tall showing a STUB as it is showing the poster --
       nothing in the margins ever moves when the center content
       swaps.
    4. Sidebar nav is now two separate accordions instead of one:
       USERS: (left, orange label) for the curious-public and
       property/agency audiences, DEV/OPS: (right, ink label) for the
       operator/builder audience -- splitting the three-way
       disambiguator across two physical menus instead of cramming
       all three into one. DEV/OPS' categories and copy are placeholder
       test paths for now, same "content coming soon" honesty as
       USERS' always were.
    5. Any STUB rendered into #centerContent now sits over a highly-
       ghosted copy of the poster (opacity 0.12) instead of flat
       cream -- the console never goes fully blank, it's always
       still visibly sitting on the poster underneath.

  Sibling files (86.2203.fyi, greens.2203.fyi) are NOT part of this
  rebuild. Only the promo-card/arrow PLACEMENT CONVENTION (item 1
  above) is meant to carry over to them -- their own internal designs
  are untouched.
  ============================================================
-->

<style>
  :root {
    --cream:  #EFE2C3;
    --ink:    #3F5D68;
    --orange: #EC8E43;
    --paper:  #FFFFFF;
    --kraft:  #8A6A44;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
    /* k-NET's real .flag height (86.2203.fyi, confirmed straight off
       its own source: `.flag { height: 200px; }`) -- a hard pixel
       value that does NOT scale with viewport width there (only the
       flag's width does). The promo cards below reference this
       constant directly rather than a percentage of the poster, so
       their vertical position matches k-NET's actual banner exactly,
       at any viewport, not an approximation of it. */
    --knet-banner-h: 200px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--mono);
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .wordmark-link,
  .wordmark-link:hover,
  .wordmark-link:visited,
  .wordmark-link:focus-visible,
  .wordmark-link:active {
    color: inherit;
    text-decoration: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 64px;
  }

  /* ---------- carousel-row: the three columns share ONE height --
     align-items:stretch makes margin-left/margin-right exactly as
     tall as .poster-frame, which is the only column with real
     content height (a fixed aspect-ratio box, see below). That
     shared height is what lets the promo cards and nav blocks in
     the margins use plain top:% positioning and land on the exact
     same visual row as the arrows, every time, at any viewport
     width -- no JS measurement needed. .page-strip lives OUTSIDE
     this row (a sibling below it) specifically so it doesn't factor
     into that shared height and skew the percentages. ---------- */
  .carousel-row {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 20px;
    width: 100%;
    max-width: 1120px;
  }

  .margin-left,
  .margin-right {
    flex: 0 0 214px;
    width: 214px;
    position: relative;
  }

  .center-frame {
    flex: 1 1 680px;
    width: 100%;
    max-width: 680px;
  }

  @media (max-width: 1120px) {
    .carousel-row { flex-direction: column; align-items: center; }
    .margin-left, .margin-right {
      position: static;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }
    .margin-left .promo, .margin-left .side-nav,
    .margin-right .promo, .margin-right .side-nav {
      position: static !important;
      transform: none !important;
      left: auto; right: auto; top: auto;
    }
    .margin-left { order: 2; }
    .center-frame { order: 1; width: 100%; max-width: 680px; }
    .margin-right { order: 3; }
  }

  /* ---------- promo cards: anchored to half of --knet-banner-h
     (100px), not a percentage of the poster. Previous pass used
     4.4% -- an approximation of where the top tagline sits -- but
     that's a guess derived FROM the poster art, when the actual
     ground truth (k-NET's real, exact flag height) was sitting right
     there in the file the whole time. This is the precise version:
     k-NET centers its own promo cards on its flag's true vertical
     midpoint (a fixed 100px into a fixed 200px banner, not scaling
     with viewport), so MTD's cards now reference that same constant
     directly instead of re-deriving an estimate. transform:
     translateY(-50%) so the card's own middle, not its top edge,
     lands on that line. ---------- */
  .promo {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(var(--knet-banner-h) / 2);
    transform: translateY(-50%);
    display: block;
    line-height: 0;
    text-decoration: none;
    border: 2px solid var(--ink);
    box-shadow: 0 3px 10px rgba(63, 93, 104, 0.25);
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .promo:hover,
  .promo:focus-visible {
    border-color: var(--orange);
    box-shadow: 0 4px 16px rgba(236, 142, 67, 0.5);
    transform: translateY(calc(-50% - 2px));
  }

  .promo--greens { background: var(--paper); }
  .greens-photo {
    display: block;
    width: 100%;
    height: auto;
    animation: greensFade 7s ease-in-out infinite;
  }
  @keyframes greensFade {
    0%, 100% { opacity: 0.15; }
    50%      { opacity: 0.7; }
  }
  .promo-label {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: #000;
    text-shadow: 0 0 5px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.7);
  }

  .promo--knet { background: #000; }
  .knet-mini {
    position: relative;
    width: 100%;
    height: 74px;
    overflow: hidden;
  }
  .knet-mini-emblem {
    position: absolute;
    top: 3px;
    bottom: 3px;
    left: 50%;
    width: 90px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom right, #1c3fd9 49.6%, #000 50.4%);
    border: 1px solid #fff;
    border-left-width: 1.5px;
    z-index: 1;
  }
  .knet-ministar {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.8;
    z-index: 0;
  }
  .promo-label--knet {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow: 0 0 6px rgba(0,0,0,0.7);
  }

  /* ---------- USERS: / DEVS: nav blocks. Anchored at 26% -- clear
     of every text line in the poster (the subtitle's last row ends
     at 24.1%), landing right where the radio-wave arcs/mountains
     take over. Top-anchored, not centered like the promo cards --
     "adjacent to the mountains" is a start line, not a midpoint. ---------- */
  .side-nav {
    position: absolute;
    left: 0;
    right: 0;
    top: 26%;
    background: var(--paper);
    border: 2px solid var(--ink);
  }
  .side-nav > *:last-child { border-bottom: none; }

  .side-nav-label {
    padding: 8px 12px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    border-bottom: 2px solid var(--ink);
  }
  .side-nav-label--users { background: var(--orange); color: var(--ink); }
  .side-nav-label--devs  { background: var(--ink); color: var(--cream); }

  .side-nav-toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--ink);
    padding: 10px 12px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.08em;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }
  .side-nav-toggle:hover,
  .side-nav-toggle:focus-visible {
    background: var(--ink);
    color: var(--cream);
  }
  .side-nav-toggle.is-active {
    color: var(--orange);
    background: none;
  }
  .side-nav-toggle .chev {
    transition: transform 0.15s ease;
    color: var(--orange);
  }
  .side-nav-toggle.is-active .chev { transform: rotate(90deg); }

  .side-nav-panel { border-bottom: 1px solid var(--ink); }
  .side-nav-panel[hidden] { display: none; }
  .side-nav-panel ul {
    list-style: none;
    margin: 0;
    padding: 6px 12px 10px 22px;
  }
  .side-nav-panel li { padding: 5px 0; font-size: 12px; }
  .side-nav-panel a {
    color: var(--ink);
    text-decoration: none;
  }
  .side-nav-panel li.is-muted { opacity: 0.55; }
  .side-nav-panel li.is-muted:hover,
  .side-nav-panel li.is-muted:focus-within { opacity: 1; }
  .side-nav-panel a:hover,
  .side-nav-panel a:focus-visible {
    color: var(--orange);
    text-decoration: underline;
  }

  /* ---------- center: fixed aspect-ratio box matching the poster's
     own pixel dimensions, so its height NEVER changes regardless of
     what's inside #centerContent. That's what keeps the promo cards
     and nav blocks (positioned by % against this column's stretched
     height) from jumping around when a sidebar click swaps the
     poster out for STUB text -- the frame stays exactly the same
     size either way. ---------- */
  .poster-frame {
    position: relative;
    aspect-ratio: 1360 / 1924;
    overflow: hidden;
  }
  .center-content {
    position: absolute;
    inset: 0;
  }
  .poster-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Ghosted poster sits behind every injected page, so the center
     console never goes flat-blank -- it's always still visibly "on"
     the poster. Only the tagline + big headline stay crisp now
     (0-17.2%, the actual pixel end of "MESH THAT DIVIDE" in the
     source art) -- the subtitle/project-description line and every
     illustrative graphic element below it (arcs, mountains, road)
     all ghost together once a path is injected. The transition
     (17.2% to 20.9%) sits entirely inside the blank gap between the
     headline and the subtitle, so it never fades mid-word. A
     mask-image gradient does this on the SAME <img> (no second
     cropped asset needed). position:absolute so it stays a true
     fixed backdrop -- .stub-copy scrolls independently on top of it
     (see below), the image itself never moves. */
  .poster-img--ghost {
    position: absolute;
    inset: 0;
    z-index: 0;
    mask-image: linear-gradient(to bottom, #000 0%, #000 17.2%, rgba(0,0,0,0.12) 20.9%, rgba(0,0,0,0.12) 100%);
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 17.2%, rgba(0,0,0,0.12) 20.9%, rgba(0,0,0,0.12) 100%);
  }
  /* Real fetched pages can run longer than "coming soon" placeholder
     text ever did. .poster-frame's height is fixed (see above) and
     must stay that way, so instead of letting long content grow the
     frame, .stub-copy scrolls INTERNALLY within it -- inset:0 gives
     it the frame's exact fixed height to scroll inside of, and the
     ghost image underneath (a separate absolutely-positioned layer)
     never scrolls away regardless of how far the text scrolls.

     padding-top is 36.78%, not 26%, and that's deliberate, not a
     typo: CSS padding percentages ALWAYS resolve against the
     containing block's WIDTH, even padding-top/bottom -- while
     .side-nav's top:26% (an offset property, not padding) resolves
     against HEIGHT, per spec. Same "26%" would land in two different
     places on a portrait frame like this one. 36.78% of this frame's
     WIDTH is what equals 26% of its HEIGHT, given its fixed
     1360:1924 aspect ratio (26 * 1924/1360 = 36.78...) -- so this is
     the number that actually lines injected content up with the
     USERS:/DEV/OPS: label headers, confirmed in a live render. If
     the poster's aspect ratio ever changes, recompute this the same
     way rather than resetting it back to 26. */
  .stub-copy {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow-y: auto;
    padding: 36.78% 9% 8%;
  }
  .stub-copy h2 {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.03em;
  }
  .stub-copy h2::before { content: "> "; color: var(--orange); }
  .stub-copy h3 {
    margin: 20px 0 6px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .stub-copy p {
    margin: 0 0 12px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 58ch;
  }
  .stub-copy ul, .stub-copy ol {
    margin: 0 0 12px;
    padding-left: 20px;
    max-width: 58ch;
  }
  .stub-copy li {
    font-size: 13px;
    line-height: 1.5;
    margin: 4px 0;
  }
  .stub-copy strong { color: var(--ink); }
  .stub-copy a {
    color: var(--orange);
    text-decoration: underline;
  }
  .stub-copy a:hover, .stub-copy a:focus-visible { color: var(--ink); }
  .stub-copy .stub-loading { opacity: 0.6; font-style: italic; }
  .stub-copy .stub-error { color: var(--kraft); }

  .page-strip {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 22px;
    width: 100%;
    padding: 20px 0 0;
  }
  .page-strip .stop {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--ink);
    opacity: 0.55;
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .page-strip .stop.is-active {
    opacity: 1;
    color: var(--orange);
    border-bottom-color: var(--orange);
  }
  .page-strip .stop.is-soon { color: var(--kraft); opacity: 0.6; }

  @media (prefers-reduced-motion: reduce) {
    .greens-photo { animation: none; }
  }
</style>
</head>

<body>
  <div class="carousel-row">

<script>
(function () {
  var PAGES = [
    { id: 'mesh',   name: 'meshTHATdivide', href: 'https://mtd.2203.fyi/', theme: '#c9812f', live: true },
    { id: 'knet',   name: 'k-NET',          href: 'https://86.2203.fyi/', theme: '#1c3fd9', live: true },
    { id: 'greens', name: 'Just Greens',    href: 'https://greens.2203.fyi/', theme: '#2f9e44', live: true }
  ];
  var CURRENT_ID = 'mesh';

  function wrap(i) { return (i + PAGES.length) % PAGES.length; }

  var idx = PAGES.findIndex(function (p) { return p.id === CURRENT_ID; });
  if (idx === -1) idx = 0;

  // ---- scrubber: always [prev, current, next] -- current lands
  // dead-center by construction, every time, on any of the three
  // files, since the carousel is round and has no fixed first/last.
  // It's the only carousel nav now -- prev/next arrows were removed;
  // scrubber links already cover the same job with less chrome.
  var strip = document.getElementById('pageStrip');
  var windowed = [ PAGES[wrap(idx - 1)], PAGES[idx], PAGES[wrap(idx + 1)] ];
  windowed.forEach(function (p) {
    var el = document.createElement(p.live ? 'a' : 'span');
    el.className = 'stop' + (p.id === CURRENT_ID ? ' is-active' : '') + (p.live ? '' : ' is-soon');
    if (p.live) el.href = p.href;
    el.textContent = p.name;
    strip.appendChild(el);
  });

  // ---- center content: capture the poster's own src/alt ONCE at
  // load, before anything swaps -- both showPoster() and the ghosted
  // background on STUB pages reuse this same string rather than the
  // markup embedding the ~540KB poster twice.
  var centerContent = document.getElementById('centerContent');
  var posterImgEl = centerContent.querySelector('img.poster-img');
  var POSTER_SRC = posterImgEl.src;
  var POSTER_ALT = posterImgEl.alt;

  function showPoster() {
    centerContent.innerHTML =
      '<img class="poster-img" src="' + POSTER_SRC + '" alt="' + POSTER_ALT + '">';
  }

  // ---- content pages: real fragments now, not inline placeholder
  // strings. Each side-nav leaf link's data-content key maps to
  // content/<key>.html, fetched and dropped straight into
  // .stub-copy over the ghosted poster. Fragments are just the
  // inner markup (an <h2>, then whatever paragraphs/lists follow) --
  // no <!DOCTYPE>/<html>/<head>/<body> wrapper, since this is
  // injected via innerHTML into an existing page, not loaded as one.
  // Files that haven't been uploaded yet fail gracefully instead of
  // leaving a blank pane.
  var CONTENT_DIR = 'content/';

  function renderContent(key) {
    centerContent.innerHTML =
      '<img class="poster-img poster-img--ghost" src="' + POSTER_SRC + '" alt="" aria-hidden="true">' +
      '<div class="stub-copy" id="stubCopy"><p class="stub-loading">Loading&hellip;</p></div>';
    var target = document.getElementById('stubCopy');
    fetch(CONTENT_DIR + key + '.html')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function (html) { target.innerHTML = html; })
      .catch(function () {
        target.innerHTML =
          '<h2>Not Yet Uploaded</h2><p class="stub-error">' +
          CONTENT_DIR + key + '.html hasn\'t been added to the content directory yet ' +
          '(or this page is being viewed over file:// rather than a real server -- ' +
          'fetch() needs http/https to read local files).</p>';
      });
  }

  // ---- delegated click handling, not a static querySelectorAll --
  // fetched content can (and does, see funding.html -> partner.html)
  // contain its own data-content cross-links to other pages. Binding
  // once at load would only ever catch the sidebar's own links;
  // delegating to a stable ancestor catches links inside content
  // that gets injected later too.
  document.addEventListener('click', function (e) {
    var link = e.target.closest('a[data-content]');
    if (!link) return;
    e.preventDefault();
    renderContent(link.dataset.content);
  });

  // ---- both accordions (USERS: and DEVS:) share one open-panel
  // pool -- opening a section in USERS: closes any open DEVS:
  // section and vice versa, same single-open-at-a-time rule as
  // within either one alone. Closing the open section restores the
  // poster.
  var toggles = document.querySelectorAll('.side-nav-toggle');
  toggles.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var panel = document.getElementById('menu-' + btn.dataset.menu);
      var wasOpen = btn.classList.contains('is-active');

      toggles.forEach(function (b) { b.classList.remove('is-active'); });
      document.querySelectorAll('.side-nav-panel').forEach(function (p) { p.hidden = true; });

      if (!wasOpen && panel) {
        panel.hidden = false;
        btn.classList.add('is-active');
      } else if (wasOpen) {
        showPoster();
      }
    });
  });
})();
</script>
