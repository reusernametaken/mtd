<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2203.fyi // Mesh That Divide</title>
<meta name="description" content="Mesh That Divide -- community-owned Meshtastic mesh network, Kremmling to the Front Range.">

<!--
  ============================================================
  2203.fyi -- Mesh That Divide landing page
  Plain HTML/CSS/vanilla JS, single file, no external dependencies.
  Sibling file to 86.2203.fyi (k-NET) and greens.2203.fyi (Just
  Greens) -- same frame/flag/statusbar/side-menu/page-strip
  scaffold as k-NET's page, forked and re-themed rather than
  written from scratch, so all three sites stay structurally
  identical and easy to maintain as a set. Anything not called
  out below is unchanged from k-NET's own page -- see that file's
  header comment for the full architecture writeup.

  WHAT'S DIFFERENT FROM k-NET's PAGE:

    1. .flag           -- k-NET's version builds its banner from
                           CSS (diagonal flag-emblem patch, starfield,
                           h1 wordmark). This page instead fills the
                           banner with an actual photo: the top slice
                           of the real Mesh That Divide poster (the
                           tagline + title band, cream background,
                           no mountains yet), cropped to y:0-320 of
                           the poster's 924x1316 source and embedded
                           as base64 JPEG on a new .flag-photo <img>,
                           object-fit:cover so it always fills the
                           640x200 box regardless of viewport width.
                           The old emblem/stars/h1/subtitle markup is
                           removed outright (not hidden) since the
                           poster already carries the title and
                           tagline as art. A visually-hidden <h1>
                           (.sr-only) preserves a real page heading
                           and a self-link to mtd.2203.fyi for
                           accessibility/SEO, mirroring k-NET's own
                           wordmark-links-to-itself pattern without
                           cluttering the image. prevArrow/nextArrow
                           are untouched structurally, just re-pointed
                           (see PAGES below) -- and get a small dark
                           legibility chip (#flagFrame .flag-arrow
                           override) since the base slate-grey arrow
                           color was tuned for a black banner, not a
                           light cream one.
    1a. .flag-accent-bar -- new, not present on k-NET's page. A 4px
                           strip along the photo's bottom edge, tied
                           to the same --flag-accent custom property
                           the script already sets per-page (amber
                           #c9812f for mesh) -- gives the removed
                           emblem's accent color a small, purposeful
                           second life instead of just disappearing.
    2. mesh-banner slot (left, "prev") -- on k-NET's page this slot
                           always promotes Mesh That Divide (fixed
                           content, since k-NET's prev neighbor is
                           mesh). Every page's prev/next neighbors are
                           different, so the CONTENT swaps per page
                           while the CSS class stays -- .mesh-banner
                           is really "the left promo slot," not
                           literally "the Mesh promo." Since this
                           page's prev neighbor is Just Greens (mesh
                           wraps to greens going backward -- see
                           PAGES), this slot now carries the exact
                           same Just Greens photo + fade animation +
                           label used in k-NET's .margin-banner,
                           lifted verbatim so the promo reads
                           identically everywhere it appears.
    3. margin-banner slot (right, "next") -- this page's next
                           neighbor is k-NET, not Just Greens, so this
                           slot needed a k-NET promo image and none
                           exists as an asset yet. Rather than
                           fabricate a screenshot, it's rebuilt in
                           pure CSS (.knet-mark): the same diagonal
                           blue/black split and wordmark k-NET's real
                           flag uses, at promo-thumbnail scale. Same
                           treatment as an earlier draft's "no photo
                           asset" fallback for this exact problem --
                           swap in a real cropped photo later if one
                           gets made, no markup changes needed beyond
                           that.
    4. #centerContent   -- k-NET's page renders a text STUB here by
                           default (Blog) and swaps in other STUBS on
                           nav click. This page instead ships the
                           REST of the poster (everything below the
                           title band -- mountains, radio-wave arcs,
                           road, "WHAT EVER CAME BETWEEN US, ANYWAY?")
                           as static markup inside #centerContent from
                           the start, so header and body read as one
                           continuous image with the flag on load --
                           DEFAULT_CONTENT is set to null and the
                           startup renderContent() call is skipped so
                           nothing overwrites it. Side-menu links still
                           swap STUB text into #centerContent exactly
                           like k-NET's page when clicked (that
                           innerHTML swap replaces the poster image
                           along with it, same as it would replace any
                           other default content) -- STUBS below are
                           labeled from the actual brochure sections
                           (Node Builds, Funding Tiers, The Route,
                           FAQ, Future Expansion, etc.) but still say
                           "Content coming soon," matching k-NET's own
                           unfinished state rather than jumping ahead
                           of it. Swap in real copy whenever it's
                           ready. EMPOWER's "Live Map" item is a real
                           external link straight to the CalTopo map
                           (caltopo.com/m/TD9BS47), not a stub, since
                           that page already exists.
    5. PAGES / CURRENT_ID -- CURRENT_ID is 'mesh' here (was 'knet').
                           Everything else in PAGES is untouched --
                           order, hrefs, and theme colors are shared
                           site-wide, only which one is "current" (and
                           therefore which neighbors this page's prev/
                           next arrows and promo slots resolve to)
                           changes between files.

  Swap the placeholder <li> items and hrefs for real links, and flesh
  out STUBS with real copy as pages get written -- same as k-NET.
  To add/remove/reorder sibling pages, edit the PAGES array near the
  bottom on ALL THREE files -- it's duplicated per-file, not shared.
  ============================================================
-->

<style>

  :root {
    --bg:        #050607;
    --panel:     #0b0d10;
    --blue:      #1c3fd9;
    --blue-deep: #0a154d;
    --ink:       #e8e8e8;
    --white:     #ffffff;
    --dim:       #6b7280;
    --glow:      #4fd1ff;
    --slate:     #708090;
    --rule:      #22262c;
    /* .flag-emblem's hoist border width. Not shared with the node
       LEDs anymore -- tying LED size to this was a wrong guess at
       what "aligning the LEDs vertically" meant; the LEDs stay their
       own 8px regardless of what this is set to. */
    --hoist-width: 4px;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .page-shell {
    width: 100%;
    max-width: 640px;
  }

  /* ---------- scanline overlay, whole page, very subtle ---------- */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 999;
  }

  /* ---------- 1. flag banner (signature element + per-page "frame") ---------- */
  .flag {
    position: relative;
    height: 200px;
    background: #000;
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 64px;
    overflow: hidden;
  }

  /* The diagonal bisection lives on this smaller emblem now, not the
     full 640px banner -- stretched across the whole width it was a
     3.2:1 box, giving a diagonal of only ~17deg off horizontal, way
     shallower than any real flag (which run closer to 30-34deg at
     typical 2:3/3:5 ratios). 300x200 is a 3:2 ratio -- matching the
     actual reference anarcho-transhumanist flag SVGs (450x300,
     384x256, both reduce to 3:2) -- so the diagonal here reads as an
     actual flag rather than a stretched banner. Height matches
     .flag's own 200px exactly (top-to-bottom of the banner), so only
     the width is narrowed; "to bottom right" still does the real
     corner-to-corner math, same as before, just against this box's
     own true 3:2 proportions instead of the fluid outer one. Outer
     .flag is solid black outside it -- the anarchist field color --
     with the emblem reading as a patch on top, fimbriated in a single
     white px per the request. */
  .flag-emblem {
    position: absolute;
    /* top+bottom insets (not top:0/height:100%) so the emblem stands
       clear of .flag's own top and bottom edges with equal margins,
       rather than stretching edge-to-edge -- 10px each side leaves it
       reading as its own standalone patch, 200-20=180px tall. Width
       is recalculated from that (180*1.5=270) to hold the 3:2 ratio;
       shrinking height without also shrinking width would distort the
       diagonal off its real proportions. */
    /* 9px, not 10 -- these insets are measured from .flag's padding
       edge, which already sits 1px in from its own border. 1+9=10px
       clear from the flag's true outer edge, landing height at
       exactly 198-9-9=180px (270/180 = 1.5 = true 3:2, not the
       178px/1.517 a flat 10px would've given). */
    top: 9px;
    bottom: 9px;
    left: 50%;
    width: 270px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom right, var(--flag-accent, var(--blue)) 49.6%, #000 50.4%);
    border: 1px solid #fff;
    /* --hoist-width: a real flag's "header" or "heading" is the
       reinforced canvas sleeve sewn along the hoist side for mounting
       to a pole, distinct from the rest of the fimbriation. */
    border-left-width: var(--hoist-width);
    /* Above .flag-stars (z-index:0 below) rather than under it -- the
       emblem is the flag itself, closer to the viewer than the stars
       behind it; stars should only show through .flag's black field
       around the emblem, not sprinkle across the emblem's own face.
       Distinct from the wordmark/arrows' own z-index:2 on purpose --
       three clear layers (stars 0, emblem 1, wordmark/arrows 2)
       rather than tying the emblem to the text layer and leaning on
       DOM order to break the tie. */
    z-index: 1;
  }

  /* Starfield -- replaces the old scanline-sweep. .flag-stars is the
     rotating layer (JS populates it with randomly-scattered .star
     dots on load); the rotation itself simulates the sky's apparent
     turn as Earth rotates, so the animation-duration below is
     literally one sidereal day (23h56m4s = 86164s) rather than an
     arbitrary loop length -- a full, seamless 360deg revolution per
     real day, which in practice reads as close to motionless during
     any normal viewing session. */
  .flag-stars {
    position: absolute;
    inset: 0;
    z-index: 0;
    animation: starTurn 86164s linear infinite;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  @keyframes starTurn {
    to { transform: rotate(360deg); }
  }

  /* Page-wide starfield -- separate from .flag-stars above, which
     stays put covering just the 640px banner (behind .flag's own
     opaque background, so it needs its own local field). This one
     splays the same effect across the full page width, matching the
     flag's own height/top position, so it shows through in the black
     gaps around the flag and the mesh-banner/margin-banner peek cards
     out to the viewport edges. Lives at the top of <body>, outside
     .page-shell's 640px column entirely -- width:100% here resolves
     against the initial containing block (viewport), not page-shell.
     Placed before .page-shell in the DOM on purpose: since it's
     position:absolute with z-index:auto, it already paints above any
     static-positioned content (like .center-frame's own background)
     regardless of source order, but .flag-wrap (also position:relative,
     z-index:auto) needs to come AFTER it in the DOM specifically so
     .flag-wrap's own subtree -- the flag, the peek cards -- paints on
     top instead of being hidden behind it. Two-layer split (outer
     .top-stars clips, inner .top-stars-spin rotates) because unlike
     .flag, there's no ancestor here already providing overflow:hidden
     to contain the rotation's sweep. */
  .top-stars {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 200px;
    overflow: hidden;
    pointer-events: none;
  }
  .top-stars-spin {
    position: absolute;
    inset: 0;
    animation: starTurn 86164s linear infinite;
  }

  .flag h1 {
    position: relative;
    z-index: 2;
    margin: 0;
    text-align: center;
    color: var(--white);
    font-size: clamp(35px, 8.5vw, 53px);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-shadow: 0 0 12px rgba(255,255,255,0.35);
    /* room is reserved by .flag's own padding, not by flex-basis --
       so bigger emblems (images, wider marks) on sibling pages get the
       full available width instead of being squeezed by arrow siblings */
  }

  /* The k-NET wordmark itself is a real link to 86.2203.fyi, but a
     quiet one -- no color shift, no underline, at rest or on hover.
     The only "tell" is the native title tooltip on hover. Everything
     else (size, weight, spacing, glow) is just inherited from h1. */
  .wordmark-link,
  .wordmark-link:hover,
  .wordmark-link:visited,
  .wordmark-link:focus-visible,
  .wordmark-link:active {
    color: inherit;
    text-decoration: none;
  }

  /* mesh node status LEDs -- placeholder pair, not wired to anything
     yet. Red is on by default (dumb default -- no script means
     "unknown/not confirmed live", flagged red until real telemetry
     exists). Add/remove .led--on to flip which one is lit. Stacked
     vertically (green above red) rather than side by side -- their
     own 8px size is unrelated to .flag-emblem's --hoist-width, which
     just happens to also be 4px right now; an earlier pass wrongly
     tied the two together and the LEDs read as too dim shrunk down to
     match, so that link's gone. */
  .node-leds {
    display: inline-flex;
    flex-direction: column;
    gap: 5px;
    margin-right: 12px;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .led--red   { background: #5a1f1f; }
  .led--green { background: #1f4a30; }
  .led--red.led--on   { background: #ff4d4d; box-shadow: 0 0 6px 2px rgba(255,77,77,0.65); }
  .led--green.led--on { background: #3ddc84; box-shadow: 0 0 6px 2px rgba(61,220,132,0.65); }

  /* Subtitle sits independent of the h1's own centering -- absolutely
     positioned halfway between the (vertically centered) title and
     the bottom edge of the flag box. */
  .flag-subtitle {
    position: absolute;
    z-index: 2;
    left: 50%;
    top: calc(75% + 20px);
    transform: translate(-50%, -50%);
    margin: 0;
    white-space: nowrap;
    text-align: center;
    color: var(--white);
    font-weight: 700;
    font-style: normal;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-shadow: 0 0 8px rgba(255,255,255,0.25);
  }

  .flag-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    background: none;
    border: none;
    padding: 8px;
    color: var(--slate);
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(18px, 4.5vw, 28px);
    letter-spacing: 0.05em;
    text-shadow: 0 0 12px rgba(112,128,144,0.45);
    cursor: pointer;
    line-height: 1;
  }
  .flag-arrow--prev { left: 8px; }
  .flag-arrow--next { right: 8px; }
  .flag-arrow:hover:not(:disabled),
  .flag-arrow:focus-visible:not(:disabled),
  /* Just Greens sits immediately right of the flag, so the "next"
     arrow is its adjacent control -- hovering the Just Greens button
     lights up this arrow too, as if you were hovering it directly.
     Mesh That Divide sits immediately left, paired the same way with
     the "prev" arrow. */
  .flag-wrap:has(.margin-banner:hover) .flag-arrow--next:not(:disabled),
  .flag-wrap:has(.margin-banner:focus-visible) .flag-arrow--next:not(:disabled),
  .flag-wrap:has(.mesh-banner:hover) .flag-arrow--prev:not(:disabled),
  .flag-wrap:has(.mesh-banner:focus-visible) .flag-arrow--prev:not(:disabled) {
    color: var(--glow);
    text-shadow: 0 0 16px rgba(79,209,255,0.6);
  }
  .flag-arrow:disabled {
    color: rgba(112,128,144,0.3);
    text-shadow: none;
    cursor: default;
  }

  .cursor {
    display: inline-block;
    width: 0.5em;
    margin-left: 2px;
    background: var(--white);
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ---------- 1b. flag-wrap: positioning context for the margin banner ---------- */
  .flag-wrap {
    position: relative;
  }

  /* Just Greens margin banner -- sits in the margin just right of the
     flag, vertically centered on the flag (which is also where the
     prev/next arrows sit, since they use the same top:50% centering).
     Real link -> https://greens.2203.fyi/. Zero internal padding: the
     image is cropped tight to the circle artwork, so the border
     touches the graphics directly with no gap. Hover state is linked
     both ways with the adjacent (next) arrow -- see the :has() rules
     on .flag-arrow and here. */
  .margin-banner {
    position: absolute;
    left: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    width: 214px;
    z-index: 3;
    display: block;
    /* Solid white backing, independent of the page background. The
       greensFade animation on the img below only pulses the JPEG's
       opacity -- without a white backing here, that fade exposes
       whatever the page background is (previously white, so the
       JPEG's own white margins vanished into it seamlessly; now the
       page is black, so this keeps that same seamless-white look
       instead of the JPEG's white background flickering toward
       black). */
    background: var(--white);
    border: 2px solid var(--rule);
    box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    padding: 0;
    line-height: 0;
    text-decoration: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .margin-banner:hover,
  .margin-banner:focus-visible,
  /* the reverse of the arrow rule above: hovering the adjacent next
     arrow makes the Just Greens button react as if hovered directly */
  .flag-wrap:has(.flag-arrow--next:hover) .margin-banner,
  .flag-wrap:has(.flag-arrow--next:focus-visible) .margin-banner {
    border-color: var(--glow);
    box-shadow: 0 4px 16px rgba(79,209,255,0.45);
    transform: translateY(calc(-50% - 2px));
  }
  .margin-banner img {
    display: block;
    width: 100%;
    height: auto;
    animation: greensFade 7s ease-in-out infinite;
  }
  .margin-banner-label {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    color: #000;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 1;
    white-space: nowrap;
    letter-spacing: -0.02em;
    text-align: center;
    text-shadow: 0 0 5px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.7);
  }

  @keyframes greensFade {
    0%, 100% { opacity: 0.13; }
    50%      { opacity: 0.66; }
  }

  /* Mesh That Divide banner button -- the left-margin twin to
     .margin-banner. Same width, same border/shadow/hover treatment,
     same reciprocal hover-link, this time with the adjacent PREV
     arrow (Mesh sits to k-NET's left in the PAGES order). Deliberately
     top-anchored rather than vertically centered like Just Greens --
     that leaves the flag's lower-left margin free for the side-menus
     (which are bottom-anchored, see .side-menu below) instead of the
     two competing for the same vertical space. No fade animation on
     the image, unlike Just Greens -- this one carries a tagline that
     needs to stay legible, not pulse in and out. */
  .mesh-banner {
    position: absolute;
    right: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    width: 214px;
    z-index: 3;
    display: block;
    border: 2px solid var(--rule);
    box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    padding: 0;
    line-height: 0;
    text-decoration: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .mesh-banner:hover,
  .mesh-banner:focus-visible,
  .flag-wrap:has(.flag-arrow--prev:hover) .mesh-banner,
  .flag-wrap:has(.flag-arrow--prev:focus-visible) .mesh-banner {
    border-color: var(--glow);
    box-shadow: 0 4px 16px rgba(79,209,255,0.45);
    transform: translateY(calc(-50% - 2px));
  }
  .mesh-banner img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ---------- 2. bracket nav bar + left-margin side menus ---------- */
  .statusbar {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ---------- 3. bracket nav ---------- */
  nav.menu {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 14px;
  }
  nav.menu button.menu-toggle {
    color: var(--ink);
    background: none;
    text-decoration: none;
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  /* is-active first, :hover after -- so a hovered button always shows
     the solid fill, but an open (not currently hovered) menu's button
     ghosts out -- dim text, but the border stays blue so it still
     visually pairs with the open side-menu panel (which carries the
     same blue outline). Clicking it again (still ghosted) is what
     closes the panel and restores the button to normal. */
  nav.menu button.menu-toggle.is-active {
    background: none;
    border-color: var(--glow);
    color: var(--dim);
    opacity: 0.6;
  }
  nav.menu button.menu-toggle:hover,
  nav.menu button.menu-toggle:focus-visible {
    color: var(--bg);
    background: var(--glow);
    border-color: var(--glow);
  }

  /* Side menus -- one per nav button, flown out into the left margin
     instead of jumping/scrolling to an inline section. Only one is
     ever visible at a time (script toggles the `hidden` attribute).
     Lives inside .flag-wrap, starting 18px below the flag's own
     bottom edge -- matching the statusbar's own margin-top so the
     block reads as clearly separate from the flag rather than glued
     to it. Its own top padding (and the header's, below) is trimmed
     to compensate, so the header text still lands level with the nav
     tab row despite that larger outer gap -- then it grows downward
     from there into the open margin space below, rather than upward
     into the flag's own vertical span. */
  .side-menu {
    position: absolute;
    right: 100%;
    top: calc(100% + 18px);
    width: 260px;
    background: var(--bg);
    border: 1px solid var(--glow);
    padding: 0 14px 14px;
    z-index: 3;
  }
  .side-menu-header {
    display: inline-block;
    margin: 0 0 12px;
    border: 2px solid var(--glow);
    color: var(--glow);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 2px 10px 4px;
    cursor: pointer;
  }
  .side-menu-header:hover,
  .side-menu-header:focus-visible {
    background: var(--glow);
    color: var(--bg);
  }
  .side-menu ul.list { margin: 0; padding: 0; }

  ul.list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ul.list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  ul.list li:last-child { border-bottom: none; }
  ul.list a {
    color: var(--ink);
    text-decoration: none;
  }
  ul.list a:hover,
  ul.list a:focus-visible {
    color: var(--glow);
  }
  #menu-expect li { color: var(--dim); }

  /* .is-muted: a single greyed-out list item (currently just the
     email link pinned to the top of SHARE) rather than a whole
     dimmed panel like #menu-expect above. Opacity rather than a
     color override so it doesn't need to fight the ul.list a color
     rules -- and it un-dims on hover/focus to make clear it's still
     a live link, not a "coming soon" placeholder. */
  .side-menu li.is-muted { opacity: 0.5; }
  .side-menu li.is-muted:hover,
  .side-menu li.is-muted:focus-within { opacity: 1; }

  /* ---------- 8a. center-content: dynamic pane inside the frame that
     side-menu links render into. Swapping innerHTML here (instead of
     navigating) is what makes clicking a link update the frame
     without a full page reload. SHARE's first data-content item
     (Blog) is what renders by default on load. */
  .center-content {
    padding: 20px 24px 4px;
  }
  .center-content h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    margin: 0 0 10px;
    letter-spacing: 0.04em;
  }
  .center-content h2::before {
    content: "> ";
    color: var(--blue);
  }
  .center-content p {
    margin: 0;
    font-size: 13px;
    color: var(--dim);
  }

  /* ---------- 8. frameset-track: single centered panel ---------- */
  .frameset-track {
    display: flex;
    justify-content: center;
  }

  main.center-frame {
    width: 100%;
    max-width: 640px;
    min-height: 100vh;
    background: var(--bg);
    border: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
  }

  /* ---------- 9. page strip -- now lives inside the frame, acting as
     its footer, instead of trailing below it on white. margin-top:auto
     (with center-frame as a flex column) is what pins it to the very
     bottom of the min-height:100vh frame -- without it, an empty or
     short frame body would leave the strip stranded right under the
     nav instead of at the bottom, with the frame's blank space
     trailing below it. ---------- */
  .page-strip {
    margin-top: auto;
    border-top: 1px solid var(--rule);
    padding: 16px 0 18px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: baseline;
    gap: 18px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .page-strip::-webkit-scrollbar { display: none; }
  /* Assumes exactly 3 stops (mesh / k-net / greens): first stop pinned
     toward the right edge of its column (so it sits close to center,
     not off at the far left), middle stop dead-center, third stop
     pinned toward the left edge of its column. If pages are added
     back later this grid needs revisiting. */
  .page-strip .stop:nth-child(1) { justify-self: end; }
  .page-strip .stop:nth-child(2) { justify-self: center; }
  .page-strip .stop:nth-child(3) { justify-self: start; }
  .page-strip .stop {
    font-size: 12px;
    color: var(--dim);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .page-strip .stop.is-active {
    color: var(--glow);
    border-bottom-color: var(--glow);
  }
  .page-strip .stop.is-soon {
    color: #3a3f47;
  }


  /* ---------- MTD-specific additions (not present on k-NET's page) ---------- */

  /* Standard visually-hidden-but-accessible utility -- keeps a real
     <h1> and a self-link to mtd.2203.fyi in the DOM for accessibility
     and SEO without visually competing with the flag photo. */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* Replaces k-NET's CSS-built emblem/starfield/wordmark: the flag
     banner is filled edge-to-edge with the poster's own title band,
     cropped y:0-320 of the 924x1316 source. object-fit:cover (not
     contain) so the 640x200 box is always fully covered -- .flag's
     own overflow:hidden (untouched, shared rule) clips it. */
  .flag-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
  }

  /* Thin accent strip along the photo's bottom edge, tied to the
     same --flag-accent custom property the script already sets per
     page (amber for mesh) -- gives that color a small, purposeful
     job now that there's no emblem for it to color. */
  .flag-accent-bar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4px;
    background: var(--flag-accent, #c9812f);
    z-index: 2;
  }

  /* The base .flag-arrow color (var(--slate)) was tuned to sit on a
     solid black banner. Against this page's light cream photo it
     reads too faint, so this page darkens the resting state via a
     higher-specificity ID-scoped override -- explicitly excluded on
     :hover/:focus-visible/:disabled so the existing glow-on-hover and
     dim-when-disabled rules (shared, unedited, further down) still
     take over normally in those states. */
  #flagFrame .flag-arrow:not(:hover):not(:focus-visible):not(:disabled) {
    color: #16110b;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.85);
  }

  /* k-NET promo mark for the right-hand (next) slot -- no photo
     asset exists yet, so this rebuilds k-NET's own real flag look
     (diagonal blue/black split + wordmark) at promo scale, same
     fallback approach used for this exact gap in an earlier draft.
     Swap for a real cropped photo later; no markup change needed
     beyond the <img> itself. */
  .knet-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 74px;
    background: linear-gradient(to bottom right, #1c3fd9 49.6%, #000 50.4%);
    color: #fff;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 0.1em;
  }

  /* The Just Greens photo now lives in the .mesh-banner slot (left/
     prev) instead of .margin-banner (right/next) -- the fade
     animation was scoped to ".margin-banner img" on k-NET's page, so
     it needs its own selector here to keep pulsing in its new slot. */
  .greens-photo {
    animation: greensFade 7s ease-in-out infinite;
  }

  /* Bleeds the default poster-body image edge-to-edge against
     .center-content's own padding (20px 24px 4px), so it reads as a
     direct continuation of the flag photo above it. Side-menu STUB
     text injected later by renderContent() ignores this -- it writes
     directly into #centerContent, not into .poster-body, so it still
     gets the normal padding. */
  .poster-body {
    margin: -20px -24px -4px;
    line-height: 0;
  }
  .poster-body img {
    display: block;
    width: 100%;
    height: auto;
  }

  @media (prefers-reduced-motion: reduce) {
    .flag-stars, .top-stars-spin, .cursor, .margin-banner img { animation: none; }
    .frameset-track { scroll-behavior: auto; }
  }
</style>
</head>

  // -- .page-strip's grid CSS pins stop 1 toward center-right, stop 2
  // dead-center, stop 3 toward center-left, assuming exactly these
  // three stops in this DOM order. Only CURRENT_ID (below) changes
  // between files -- it drives is-active styling and which neighbors
  // the arrows/promo slots resolve to, not the strip's left-to-right
  // order.
  // 'mesh' theme (#c9812f, amber) pulled from the poster's own orange.

  var CURRENT_ID = 'mesh';

  var idx = PAGES.findIndex(function (p) { return p.id === CURRENT_ID; });
  if (idx === -1) idx = 0;

  var flag = document.getElementById('flagFrame');
  if (flag) flag.style.setProperty('--flag-accent', PAGES[idx].theme);

  // ---- star scatter: shared by both starfields (.flag-stars inside
  // the flag, .top-stars-spin spanning the page). Percentage-based
  // left/top (not the box-shadow-on-one-element trick) on purpose --
  // box-shadow offsets can't be percentages, and both containers are
  // fluid-width with a fixed height, so pixel offsets would drift out
  // of position on resize. Each container rotates in CSS (see
  // @keyframes starTurn) at one revolution per sidereal day.
  function scatterStars(container, count) {
    if (!container) return;
    var frag = document.createDocumentFragment();
    for (var s = 0; s < count; s++) {
      var star = document.createElement('span');
      star.className = 'star';
      star.style.left = (Math.random() * 100).toFixed(2) + '%';
      star.style.top = (Math.random() * 100).toFixed(2) + '%';
      var size = Math.random() < 0.15 ? 2 : 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.opacity = (0.25 + Math.random() * 0.6).toFixed(2);
      frag.appendChild(star);
    }
    container.appendChild(frag);
  }

  // .flag-stars: fixed count, matches the flag's own fixed 640x200
  // reference size this density was tuned against.
  scatterStars(document.getElementById('flagStars'), 70);

  // .top-stars-spin: same density (70 per 640x200 = 0.000547/px²),
  // scaled to however wide the page actually renders at load, so the
  // wider band doesn't look sparser than the flag's own field.
  var topStarsEl = document.getElementById('topStars');
  var topStarsSpinEl = document.getElementById('topStarsSpin');
  if (topStarsEl && topStarsSpinEl) {
    var density = 70 / (640 * 200);
    var topCount = Math.round(density * topStarsEl.clientWidth * topStarsEl.clientHeight);
    scatterStars(topStarsSpinEl, topCount);
  }

  function wrap(i) { return (i + PAGES.length) % PAGES.length; }

  function nearestLive(fromIndex, dir) {
    for (var step = 1; step <= PAGES.length; step++) {
      var p = PAGES[wrap(fromIndex + dir * step)];
      if (p.live) return p;
    }
    return null;
  }

  var prevArrow = document.getElementById('prevArrow');
  var nextArrow = document.getElementById('nextArrow');
  var prevTarget = nearestLive(idx, -1);
  var nextTarget = nearestLive(idx, 1);

  if (prevTarget) prevArrow.addEventListener('click', function () { location.href = prevTarget.href; });
  else prevArrow.disabled = true;

  if (nextTarget) nextArrow.addEventListener('click', function () { location.href = nextTarget.href; });
  else nextArrow.disabled = true;

  var strip = document.getElementById('pageStrip');
  PAGES.forEach(function (p) {
    var el = document.createElement(p.live ? 'a' : 'span');
    el.className = 'stop' + (p.id === CURRENT_ID ? ' is-active' : '') + (p.live ? '' : ' is-soon');
    if (p.live) el.href = p.href;
    el.textContent = p.name;
    strip.appendChild(el);
  });
  var active = strip.querySelector('.is-active');
  if (active && strip.scrollWidth > strip.clientWidth) {
    active.scrollIntoView({ inline: 'center', block: 'nearest' });
  }

  // ---- left-margin side menus: SHARE / EQUIP / EMPOWER / RECLAIM /
  // EXPECT fly out a panel instead of scrolling to an inline section.
  // One open at a time; clicking the currently-open (ghosted) button
  // closes it and restores the page to normal.
  var menuButtons = document.querySelectorAll('.menu-toggle');
  menuButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = 'menu-' + btn.dataset.menu;
      var targetPanel = document.getElementById(targetId);
      var wasOpen = btn.classList.contains('is-active');

      menuButtons.forEach(function (b) { b.classList.remove('is-active'); });
      document.querySelectorAll('.side-menu').forEach(function (panel) {
        panel.hidden = true;
      });

      if (!wasOpen && targetPanel) {
        targetPanel.hidden = false;
        btn.classList.add('is-active');
      }
    });
  });

  // Tapping an expanded panel's own header closes it too, exactly as
  // if its ghosted nav button were tapped -- literally reuses that
  // button's click handler above rather than duplicating the
  // close logic, so the two stay in sync automatically.
  document.querySelectorAll('.side-menu').forEach(function (panel) {
    var header = panel.querySelector('.side-menu-header');
    if (!header) return;
    header.setAttribute('role', 'button');
    header.setAttribute('tabindex', '0');
    header.addEventListener('click', function () {
      var btn = document.querySelector('.menu-toggle[data-menu="' + panel.id.replace('menu-', '') + '"]');
      if (btn) btn.click();
    });
    header.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        header.click();
      }
    });
  });

  // ---- center-content: side-menu links with data-content render
  // straight into the frame's middle instead of navigating anywhere --
  // no page reload, no network fetch. Same mechanic as k-NET's page,
  // but the default view here is the static poster-body markup already
  // sitting in #centerContent's HTML (see the doc comment up top), not
  // a STUB -- so DEFAULT_CONTENT is null and the startup call below is
  // guarded, rather than calling renderContent() unconditionally like
  // k-NET's page does. Clicking any nav item still swaps that poster
  // image out for the matching STUB below, same innerHTML-replace
  // mechanic either way. Labels are pulled from the real brochure
  // sections; bodies are still placeholders -- matching k-NET's own
  // unfinished state rather than jumping ahead of it. Swap in real
  // copy as it's ready.
  var STUBS = {
    blog:      { title: 'Blog',               body: 'Field notes and dispatches from the corridor. Content coming soon.' },
    forum:     { title: 'Forum',               body: 'Open discussion board for Mesh That Divide and friends. Content coming soon.' },
    builds:    { title: 'Node Builds',         body: 'Standard Highway 40 Relay Node and Berthoud Pass Flagship specs, parts, and costs. Content coming soon.' },
    funding:   { title: 'Funding Tiers',       body: '$15 to $3,500 -- what each tier builds, from a single radio module to the whole corridor. Content coming soon.' },
    partner:   { title: 'Location Partner',    body: 'Host a node on your property or business. Rewards and what hosting involves. Content coming soon.' },
    route:     { title: 'The Route',           body: 'Kremmling to the Front Range along Highway 40 -- the corridor, the waypoints, and why this road and not I-70. Content coming soon.' },
    nodechain: { title: 'Node Chain Status',   body: 'Elevation, land status, and confirmed/penciled status for every node from kNET to ColoradoMesh. Content coming soon.' },
    who:       { title: "Who's Building This", body: 'A disabled resident of Kremmling, zero corporate backing, zero grants, a ThinkPad. Content coming soon.' },
    faq:       { title: 'FAQ',                 body: 'Legality, ownership, how your own radio strengthens the mesh, and how this connects to ColoradoMesh. Content coming soon.' },
    blueriver: { title: 'Blue River Valley',   body: 'Southward expansion pathway toward the Summit County ski areas. Content coming soon.' },
    vail:      { title: 'Vail Corridor',       body: 'Potential connection over the Gore Range into Eagle County. Content coming soon.' }
  };
  var DEFAULT_CONTENT = null;

  function renderContent(key) {
    var data = STUBS[key];
    var el = document.getElementById('centerContent');
    if (!data || !el) return;
    el.innerHTML = '<h2>' + data.title + '</h2><p>' + data.body + '</p>';
  }

  document.querySelectorAll('.side-menu a[data-content]').forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      renderContent(link.dataset.content);
    });
  });

  if (DEFAULT_CONTENT) renderContent(DEFAULT_CONTENT);
})();
</script>
</body>
</html>
